# ---------- Preset hotkeys ----------
# r        RIFE interpolation (film; output rate auto-locks to the display)
# u        AnimeJaNai 2x neural upscale (anime up to 1080p -> 4K, fps unchanged)
# e        "Envy" mode: upscale + interpolation in one graph (the main anime key)
# 8        8K profile: neural 2x to 7680x4320 for 4K sources, NO interpolation
#          (RIFE+8K together don't fit the 5090 budget; measured 36 fps at 4K->8K)
# Mode keys are exclusive: enabling one disables the previous. Same key = off.
# b        debanding on/off (anime, streams with gradient banding)
# TAB      stats panel (fps, drops, filters)

# r, u and e are registered by scripts/smart-modes.lua: keys are exclusive
# (enabling one mode disables the other), upscale networks stay off on HDR
b cycle deband
TAB script-binding stats/display-stats-toggle

# mouse wheel: volume
WHEEL_UP    add volume 2
WHEEL_DOWN  add volume -2
