# ---------- Хоткеи пресета ----------
# r        RIFE-уплавнялка (кино; частота подбирается под дисплей сама)
# u        AnimeJaNai 2x нейро-апскейл (аниме до 1080p -> 4K, fps не меняет)
# e        режим "Envy": апскейл + уплавнялка одним графом (основная кнопка для аниме)
# 8        8K-профиль: нейро-апскейл 2x до 7680x4320 для 4K-исходников, БЕЗ уплавнялки
#          (RIFE+8K вместе в бюджет 5090 не влезают; замер 36 fps на 4K->8K)
# Кнопки эксклюзивны: включение режима само снимает предыдущий. Выключение = та же кнопка.
# b        дебандинг вкл/выкл (аниме, стримы с полосами в градиентах)
# TAB      панель статистики (fps, дропы, фильтры)

# r, u и e регистрирует scripts/smart-modes.lua: кнопки эксклюзивны (включение
# одного режима снимает другой), на HDR апскейл-сеть не включается
b cycle deband
TAB script-binding stats/display-stats-toggle

# колесо мыши: громкость
WHEEL_UP    add volume 2
WHEEL_DOWN  add volume -2
