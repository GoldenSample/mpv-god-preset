# ============================================================
#  Neural preset for RTX 5090 + 4K@144 / 8K@60
#  Built 2026-07-12. Portable config, lives next to mpv.exe
# ============================================================

# ---------- Rendering ----------
vo=gpu-next                     # libplacebo renderer, best quality
gpu-api=d3d11                   # the stable HDR path on Windows
d3d11-flip=no                   # CRITICAL for 8K: the flip presentation model
                                # strangles 8K@60 fullscreen down to 31.8 Hz
                                # (measured), every second vsync vanishes ->
                                # drops. Without it, an honest 60.
hwdec=auto-copy                 # NVDEC with copy-back: compatible with the RIFE filter
profile=high-quality            # ewa_lanczossharp and the full top-tier scaling in one line

# ---------- Cadence (THE key part, anti-judder) ----------
# 144 Hz = 24 x 6: every film frame shown exactly 6 times, pulldown vanishes
video-sync=display-resample     # video rate locked precisely to the display
interpolation=yes
tscale=oversample               # crisp frame repetition, no blur or blending

# ---------- HDR ----------
target-colorspace-hint=yes      # content's HDR passport is passed to the display as is
# if the display is in SDR, mpv tone-maps by itself:
tone-mapping=spline

# ---------- Picture ----------
# Deband is off by default: on a clean master it only eats grain. It turns
# itself on for SDR (profile deband-auto below) and on keys 1-5 by hand.
deband=no
deband-iterations=3             # values = the "Medium" preset of the Deband MPV
deband-threshold=40             # HLSL shader, which is a port of mpv's own deband.
deband-range=15                 # Ported back one-to-one: Threshold -> threshold,
deband-grain=20                 # Range -> range, Iterations, Grain.

# Dithering. On gpu-next, dither-depth=auto means DETECTED depth only, with no
# fallback to 8 (unlike the old vo=gpu), and detection works only on d3d11.
# So state it explicitly: 10 is what the panel takes over HDMI.
dither-depth=10
dither=fruit                    # on gpu-next this is NOT mpv's fruit matrix, it is
                                # libplacebo BLUE NOISE. Error diffusion is
                                # deliberately avoided: it is a single-workgroup
                                # algorithm (1024 threads on one SM out of 170) and
                                # at 8K it needs 50.6 KiB of shared memory against
                                # NVIDIA's 49152 ceiling, so it silently falls back.
                                # mpv's and libplacebo's author on it: flickers in
                                # motion, indistinguishable from blue noise above 8 bit.

# Anti-ringing. Measured optimum is 0.8 (Artoriuz, MAE/PSNR/SSIM); the
# high-quality profile only sets 0.6. On gpu-next cscale-antiring DOES work
# (widely copied configs claim otherwise and are wrong), while dscale-antiring
# really is dead for separable filters.
scale-antiring=0.8
cscale=ewa_lanczossharp         # chroma to 4:4:4 - the second biggest contributor
cscale-antiring=0.8             # to a "clean" image after debanding

blend-subtitles=yes             # subtitles go through the HDR tone-map correctly

# ---------- Audio ----------
audio-channels=auto-safe
volume=100
volume-max=150
audio-file-auto=fuzzy

# ---------- Subtitles and tracks ----------
alang=ru,rus,en,eng
slang=ru,rus,en,eng
sub-auto=fuzzy                  # pick up external subs with a similar filename

# ---------- Behavior ----------
fullscreen=yes
keep-open=yes                   # don't quit at the end of the file
save-position-on-quit=yes       # resume where you left off
autofit-larger=90%x90%
snap-window=yes

# ---------- Screenshots ----------
screenshot-format=png
screenshot-directory=~/Pictures/mpv-shots

# ---------- Network / streams ----------
cache=yes
demuxer-max-bytes=800MiB
demuxer-readahead-secs=60

# ============================================================
#  Profiles (enable with: mpv --profile=name, or keys from input.conf)
# ============================================================

# ---------- Deband presets (keys 1-5) ----------
# Values taken one-to-one from the Deband MPV Light/Medium/Strong/Xtreme HLSL
# shaders that people load into MPC-HC as a pre-resize shader. That shader is a
# port of mpv's own deband, so the mapping back is exact.

[deband-light]
deband=yes
deband-threshold=30
deband-range=10
deband-iterations=2
deband-grain=10

[deband-medium]
deband=yes
deband-threshold=40
deband-range=15
deband-iterations=3
deband-grain=20

[deband-strong]
deband=yes
deband-threshold=60
deband-range=25
deband-iterations=4
deband-grain=40

[deband-xtreme]
deband=yes
deband-threshold=80
deband-range=35
deband-iterations=4
deband-grain=50

# ---------- Automatic deband by content type ----------
# Mirrors the madVR profile rule `if (HDR) "HDR" else "SDR"`. Deband turns
# itself on for SDR; on HDR it stays quiet, because 4K masters are usually
# clean and rips with visible banding have keys 1-5.
[deband-auto]
profile-cond=get("video-params/gamma","") ~= "pq" and get("video-params/gamma","") ~= "hlg"
profile-restore=copy
deband=yes

# HDR deband: grain near zero. libplacebo's own header warns that on HDR
# sources even a small amount of grain produces a very large brightness
# change, and recommends scaling it down or disabling it. Key 5.
[deband-hdr]
deband=yes
deband-threshold=40
deband-range=15
deband-iterations=3
deband-grain=4

# 8K: trim what does not fit into 33 megapixels per frame.
[8k-output]
profile-cond=get("display-height",0) >= 4300
profile-restore=copy
deband-iterations=1

# Anime / streams with banding
[anime]
deband=yes
deband-iterations=2
deband-grain=24
