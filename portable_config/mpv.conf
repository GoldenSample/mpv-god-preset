# ============================================================
#  Пресет "как божеенька" для 5090 + 4K@144
#  Собрано 2026-07-12. Портативный конфиг, лежит рядом с mpv.exe
# ============================================================

# ---------- Рендер ----------
vo=gpu-next                     # новый рендерер на libplacebo, лучшее качество
gpu-api=d3d11                   # стабильный путь для HDR на Windows
d3d11-flip=no                   # КРИТИЧНО для 8K: flip-модель презентации душит
                                # полный экран на 8K@60 до 31.8 Гц (замер), каждый
                                # второй vsync пропадает -> дропы. Без неё честные 60.
hwdec=auto-copy                 # NVDEC с копией в RAM: совместимо с RIFE-фильтром
profile=high-quality            # ewa_lanczossharp и весь топовый скейлинг разом

# ---------- Каденция (ГЛАВНОЕ, анти-джадер) ----------
# 144 Гц = 24 x 6: каждый кадр кино показывается ровно 6 раз, pulldown исчезает
video-sync=display-resample     # частота видео подгоняется под дисплей точно
interpolation=yes
tscale=oversample               # чёткое повторение кадров без мыла и блендинга

# ---------- HDR ----------
target-colorspace-hint=yes      # HDR-паспорт содержимого отдаётся дисплею как есть
# если дисплей в SDR, mpv сам тонмапит:
tone-mapping=spline

# ---------- Картинка ----------
deband=no                       # не трогаем зерно плёнки; клавиша b включает для аниме/стримов
dither-depth=auto
blend-subtitles=yes             # сабы корректно проходят HDR-тонмап

# ---------- Звук ----------
audio-channels=auto-safe
volume=100
volume-max=150
audio-file-auto=fuzzy

# ---------- Сабы и дорожки ----------
alang=ru,rus,en,eng
slang=ru,rus,en,eng
sub-auto=fuzzy                  # подхват внешних сабов с похожим именем

# ---------- Поведение ----------
fullscreen=yes
keep-open=yes                   # не закрываться в конце файла
save-position-on-quit=yes       # продолжить с места выхода
autofit-larger=90%x90%
snap-window=yes

# ---------- Скриншоты ----------
screenshot-format=png
screenshot-directory=C:\Users\Administrator\Pictures\mpv-shots

# ---------- Сеть / стримы ----------
cache=yes
demuxer-max-bytes=800MiB
demuxer-readahead-secs=60

# ============================================================
#  Профили (включать: mpv --profile=имя, или клавишами из input.conf)
# ============================================================

# Аниме / стримы с бандингом
[anime]
deband=yes
deband-iterations=2
deband-grain=24
